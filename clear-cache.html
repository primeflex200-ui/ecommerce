<!DOCTYPE html>
<html>
<head>
    <title>Clear Cache</title>
    <script>
        // Clear localStorage
        localStorage.clear();
        
        // Force reload
        alert('Cache cleared! The page will now reload.');
        window.location.href = 'shop.html?v=' + Date.now();
    </script>
</head>
<body>
    <h1>Clearing cache...</h1>
</body>
</html>
