<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - Vendor</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Vendor Portal</h2>
                <p id="vendor-name-display" style="font-size: 0.9rem; color: #ccc; margin-top: 5px;"></p>
            </div>
            <nav class="sidebar-nav">
                <a href="vendor-dashboard.html" class="nav-link">Dashboard</a>
                <a href="vendor-products.html" class="nav-link active">My Products</a>
                <a href="vendor-orders.html" class="nav-link">My Orders</a>
                <a href="#" class="nav-link" onclick="vendorLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>My Products</h1>
                <button class="btn-primary" onclick="openAddProductPanel()">Add New Product</button>
            </div>
            
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="vendor-products-table-body">
                        <!-- Products will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Side Panel -->
    <div class="edit-panel" id="product-panel">
        <div class="edit-panel-header">
            <h2 id="product-panel-title">Add New Product</h2>
            <button class="close-panel" onclick="closeProductPanel()">&times;</button>
        </div>
        <div class="edit-panel-content">
            <form id="vendor-product-form" onsubmit="saveVendorProduct(event)">
                <input type="hidden" id="product-id">
                
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="product-name" required>
                </div>
                
                <div class="form-group">
                    <label>Category *</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <select id="product-category" required style="flex: 1;">
                            <option value="">Select Category</option>
                        </select>
                        <button type="button" class="btn-secondary" onclick="openAddCategoryModal()" style="padding: 0.5rem 1rem; white-space: nowrap;">+ New</button>
                        <button type="button" class="btn-secondary" onclick="openDeleteCategoryModal()" style="padding: 0.5rem 1rem; background: #dc3545; border-color: #dc3545;">Delete</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Subcategory *</label>
                    <input type="text" id="product-subcategory" required>
                </div>
                
                <div class="form-group">
                    <label>Price (₹) *</label>
                    <input type="number" id="product-price" required min="0">
                </div>
                
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="product-stock" required min="0">
                </div>
                
                <div class="form-group">
                    <label>Unit *</label>
                    <select id="product-unit" required>
                        <option value="piece">Piece</option>
                        <option value="kg">Kilogram (kg)</option>
                        <option value="gram">Gram (g)</option>
                        <option value="liter">Liter (L)</option>
                        <option value="ml">Milliliter (ml)</option>
                        <option value="dozen">Dozen</option>
                        <option value="pack">Pack</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="product-description" rows="4"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Product Image</label>
                    <div id="product-current-image"></div>
                    <input type="file" id="product-image" accept="image/*" onchange="previewProductImage(event)">
                </div>
                
                <div class="form-message" id="product-form-message"></div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Product</button>
                    <button type="button" class="btn-secondary" onclick="closeProductPanel()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Add Category Modal -->
    <div class="modal" id="add-category-modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>Add New Category</h3>
                <button class="close-modal" onclick="closeAddCategoryModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-category-form" onsubmit="addNewCategory(event)">
                    <div class="form-group">
                        <label>Category Name *</label>
                        <input type="text" id="new-category-name" required placeholder="e.g., Bakery & Dairy">
                    </div>
                    <div class="form-message" id="category-form-message"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Add Category</button>
                        <button type="button" class="btn-secondary" onclick="closeAddCategoryModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Delete Category Modal -->
    <div class="modal" id="delete-category-modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>Delete Category</h3>
                <button class="close-modal" onclick="closeDeleteCategoryModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="delete-category-form" onsubmit="deleteCategory(event)">
                    <div class="form-group">
                        <label>Select Category to Delete *</label>
                        <select id="delete-category-select" required>
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <p style="color: #dc3545; font-size: 0.9rem; margin: 1rem 0;">
                        <strong>Warning:</strong> Deleting a category will not delete products in that category, but they will need to be reassigned to a new category.
                    </p>
                    <div class="form-message" id="delete-category-message"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" style="background: #dc3545; border-color: #dc3545;">Delete Category</button>
                        <button type="button" class="btn-secondary" onclick="closeDeleteCategoryModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="admin-script.js"></script>
</body>
</html>
