<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - CB</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Vendor Portal</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="vendor-dashboard.html" class="nav-link active">Dashboard</a>
                <a href="vendor-products.html" class="nav-link">My Products</a>
                <a href="vendor-orders.html" class="nav-link">My Orders</a>
                <a href="#" class="nav-link" onclick="vendorLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>Vendor Dashboard</h1>
            </div>
            
            <!-- SECTION 1: Vendor Info -->
            <div class="vendor-info-section">
                <div class="info-card">
                    <div class="info-item">
                        <span class="info-label">Vendor Name:</span>
                        <span class="info-value" id="vendor-name-info">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Vendor ID:</span>
                        <span class="info-value" id="vendor-id-info">-</span>
                    </div>
                </div>
            </div>
            
            <!-- SECTION 2: Inventory Table -->
            <div class="section-container">
                <h2 class="section-title">Inventory</h2>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Unit</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body">
                            <!-- Inventory will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- SECTION 3: Orders Received -->
            <div class="section-container">
                <h2 class="section-title">Orders Received</h2>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Product</th>
                                <th>Quantity</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="orders-received-table-body">
                            <!-- Orders will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Stock Modal -->
    <div class="edit-panel" id="stock-edit-panel">
        <div class="edit-panel-header">
            <h2>Update Stock</h2>
            <button class="close-panel" onclick="closeStockPanel()">&times;</button>
        </div>
        <div class="edit-panel-content">
            <form id="stock-edit-form" onsubmit="saveStockUpdate(event)">
                <input type="hidden" id="stock-product-id">
                
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="stock-product-name" readonly style="background: #f5f5f5;">
                </div>
                
                <div class="form-group">
                    <label>Current Stock</label>
                    <input type="number" id="stock-current" readonly style="background: #f5f5f5;">
                </div>
                
                <div class="form-group">
                    <label>New Stock Quantity *</label>
                    <input type="number" id="stock-new" required min="0">
                </div>
                
                <div class="form-message" id="stock-form-message"></div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Update Stock</button>
                    <button type="button" class="btn-secondary" onclick="closeStockPanel()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="unified-auth.js"></script>
    <script src="order-management.js"></script>
    <script src="admin-script.js"></script>
    <script>
        // Check vendor access
        checkAuth();
        checkRoleAccess(['vendor']);
    </script>
</body>
</html>
