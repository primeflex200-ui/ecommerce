<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CB Admin</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>CB Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-link active">Dashboard</a>
                <a href="admin-products.html" class="nav-link">Products</a>
                <a href="admin-add-product.html" class="nav-link">Add Product</a>
                <a href="admin-orders.html" class="nav-link">Orders</a>
                <a href="#" class="nav-link" onclick="adminLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>Dashboard</h1>
            </div>
            
            <div class="dashboard-cards">
                <div class="dashboard-card">
                    <h3>Total Products</h3>
                    <p class="card-value" id="total-products">0</p>
                </div>
                
                <div class="dashboard-card">
                    <h3>Orders Received</h3>
                    <p class="card-value" id="total-orders">0</p>
                </div>
                
                <div class="dashboard-card">
                    <h3>Out of Stock</h3>
                    <p class="card-value" id="out-of-stock">0</p>
                </div>
            </div>
            
            <div class="recent-section">
                <h2>Recent Orders</h2>
                <div id="recent-orders-list"></div>
            </div>
        </main>
    </div>
    
    <script src="admin-script.js"></script>
</body>
</html>
