<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Vendor</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Vendor Portal</h2>
                <p id="vendor-name-display" style="font-size: 0.9rem; color: #ccc; margin-top: 5px;"></p>
            </div>
            <nav class="sidebar-nav">
                <a href="vendor-dashboard.html" class="nav-link">Dashboard</a>
                <a href="vendor-products.html" class="nav-link">My Products</a>
                <a href="vendor-orders.html" class="nav-link active">My Orders</a>
                <a href="#" class="nav-link" onclick="vendorLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>My Orders</h1>
            </div>
            
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Order Date</th>
                            <th>Delivery Date</th>
                            <th>Delivery Status</th>
                        </tr>
                    </thead>
                    <tbody id="vendor-orders-table-body">
                        <!-- Orders will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script src="admin-script.js"></script>
</body>
</html>
