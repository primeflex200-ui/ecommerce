<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Vendor Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        pre {
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Vendor Login Debug Tool</h1>
    
    <div class="section">
        <h2>Current Session Data</h2>
        <button onclick="showSessionData()">Show Session Data</button>
        <button onclick="clearSession()">Clear Session</button>
        <pre id="session-data"></pre>
    </div>
    
    <div class="section">
        <h2>Users in Storage</h2>
        <button onclick="showUsers()">Show All Users</button>
        <pre id="users-data"></pre>
    </div>
    
    <div class="section">
        <h2>Vendors in Storage</h2>
        <button onclick="showVendors()">Show All Vendors</button>
        <pre id="vendors-data"></pre>
    </div>
    
    <div class="section">
        <h2>Quick Actions</h2>
        <button onclick="testVendorLogin()">Test Vendor Login</button>
        <button onclick="goToVendorDashboard()">Go to Vendor Dashboard</button>
        <button onclick="goToLogin()">Go to Login Page</button>
    </div>
    
    <script src="unified-auth.js"></script>
    <script>
        function showSessionData() {
            const data = {
                isLoggedIn: localStorage.getItem('isLoggedIn'),
                userRole: localStorage.getItem('userRole'),
                currentVendorId: localStorage.getItem('currentVendorId'),
                currentVendorName: localStorage.getItem('currentVendorName'),
                currentUser: localStorage.getItem('currentUser')
            };
            document.getElementById('session-data').textContent = JSON.stringify(data, null, 2);
        }
        
        function clearSession() {
            logout();
            alert('Session cleared!');
            showSessionData();
        }
        
        function showUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            document.getElementById('users-data').textContent = JSON.stringify(users, null, 2);
        }
        
        function showVendors() {
            const vendors = JSON.parse(localStorage.getItem('vendors')) || [];
            document.getElementById('vendors-data').textContent = JSON.stringify(vendors, null, 2);
        }
        
        function testVendorLogin() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const vendors = JSON.parse(localStorage.getItem('vendors')) || [];
            
            const vendorUser = users.find(u => u.role === 'vendor');
            
            if (vendorUser) {
                localStorage.setItem('currentUser', JSON.stringify(vendorUser));
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', 'vendor');
                
                const vendor = vendors.find(v => v.userId === vendorUser.id || v.email === vendorUser.email);
                if (vendor) {
                    localStorage.setItem('currentVendorId', vendor.id);
                    localStorage.setItem('currentVendorName', vendor.vendorName);
                    alert('Vendor session set! Check session data.');
                    showSessionData();
                } else {
                    alert('Vendor record not found!');
                }
            } else {
                alert('No vendor user found!');
            }
        }
        
        function goToVendorDashboard() {
            window.location.href = 'vendor-dashboard.html';
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
        
        // Auto-show data on load
        showSessionData();
        showUsers();
        showVendors();
    </script>
</body>
</html>
