<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login - CB Organic Products</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body class="admin-login-page">
    <!-- Back to Website Button -->
    <a href="index.html" class="back-to-website">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Website
    </a>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Vendor Portal</h1>
                <p>CB Organic Products</p>
            </div>
            
            <form id="vendor-login-form" onsubmit="handleVendorLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="vendor-email" required placeholder="vendor@example.com">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="vendor-password" required placeholder="Enter password">
                </div>
                
                <div class="login-message" id="login-message"></div>
                
                <button type="submit" class="btn-primary">Login to Dashboard</button>
            </form>
            
            <div class="login-footer">
                <p><a href="admin.html">Admin Login</a></p>
            </div>
        </div>
    </div>
    
    <script>
        // Redirect to unified login
        window.location.href = 'login.html';
    </script>
    <script src="unified-auth.js"></script>
    <script src="admin-script.js"></script>
</body>
</html>
